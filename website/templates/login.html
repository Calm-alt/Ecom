{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="auth-subtext">Log in to continue shopping.</p>
        <form method="POST">
            <label>Email</label>
            <input type="email" name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit" class="btn-primary btn-block">Log In</button>
        </form>
        <p class="auth-switch">New here? <a href="/sign-up">Create an account</a></p>
    </div>
</div>
{% endblock %}
